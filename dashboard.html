<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects Center — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>

/* ─────────────────────────────────────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────────────────────────────────────── */
:root {
  /* backgrounds */
  --bg:          #0A0A0F;
  --bg-sidebar:  #0C0C14;
  --bg-topbar:   rgba(10,10,15,0.85);
  --surface:     rgba(255,255,255,0.038);
  --surface-h:   rgba(255,255,255,0.062);
  --surface-hh:  rgba(255,255,255,0.09);

  /* borders */
  --bd:          rgba(255,255,255,0.08);
  --bd-h:        rgba(255,255,255,0.15);
  --bd-accent:   rgba(108,99,255,0.35);

  /* accent */
  --a:    #6C63FF;
  --a2:   #9C63FF;
  --ag:   linear-gradient(135deg,#6C63FF,#9C63FF);
  --ag-t: rgba(108,99,255,0.18);

  /* text */
  --t:    #EDEEFF;
  --t2:   #7E7D9E;
  --t3:   #38374E;

  /* fonts */
  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;

  /* layout */
  --sb-w:  220px;
  --sb-c:  66px;

  /* timing */
  --ease:   cubic-bezier(0.4,0,0.2,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --ring-t: 1.2s cubic-bezier(0.25,1,0.5,1);
}

/* ─────────────────────────────────────────────────────────────────────────────
   RESET
───────────────────────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--t);
  display: flex;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font-family: var(--fb); cursor: pointer; border: none; background: none; }
svg { display: block; }

/* ─────────────────────────────────────────────────────────────────────────────
   BACKGROUND GRID
───────────────────────────────────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(rgba(108,99,255,0.055) 1px, transparent 1px);
  background-size: 26px 26px;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 60%, rgba(108,99,255,0.06) 0%, transparent 100%),
    radial-gradient(ellipse 40% 40% at 85% 20%, rgba(156,99,255,0.04) 0%, transparent 100%);
}

/* ─────────────────────────────────────────────────────────────────────────────
   SCROLLBAR
───────────────────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(108,99,255,0.45); }

/* ─────────────────────────────────────────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────────────────────────────────────────── */
.sidebar {
  position: relative; z-index: 30;
  width: var(--sb-w);
  min-width: var(--sb-w);
  height: 100%;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--bd);
  display: flex;
  flex-direction: column;
  padding: 24px 0;
  transition: width 0.3s var(--ease), min-width 0.3s var(--ease);
  overflow: hidden;
}
.sidebar.is-collapsed {
  width: var(--sb-c);
  min-width: var(--sb-c);
}

/* collapse toggle */
.sb-toggle {
  position: absolute; top: 26px; right: -12px; z-index: 40;
  width: 24px; height: 24px;
  background: #181824;
  border: 1px solid var(--bd);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
.sb-toggle:hover {
  background: var(--ag-t);
  border-color: var(--bd-accent);
  color: var(--a);
}
.sb-toggle svg { width:10px; height:10px; transition: transform 0.3s var(--ease); }
.sidebar.is-collapsed .sb-toggle svg { transform: rotate(180deg); }

/* logo */
.sb-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px 26px;
  flex-shrink: 0; overflow: hidden;
}
.sb-logo-mark {
  width: 32px; height: 32px; min-width: 32px;
  background: var(--ag);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(108,99,255,0.45);
  flex-shrink: 0;
}
.sb-logo-mark svg { width:15px; height:15px; }
.sb-logo-name {
  font-family: var(--fh);
  font-size: 14px; font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--t);
  white-space: nowrap;
  transition: opacity 0.2s, transform 0.2s;
}
.sidebar.is-collapsed .sb-logo-name { opacity:0; transform: translateX(-6px); pointer-events:none; }

/* nav */
.sb-nav { flex: 1; padding: 0 8px; display: flex; flex-direction: column; gap: 2px; }

.sb-divider {
  height: 1px; background: var(--bd);
  margin: 8px 10px; opacity: 0.7;
}

.sb-item {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 11px;
  border-radius: 9px;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.18s, border-color 0.18s;
}
/* sliding underline */
.sb-item::after {
  content: '';
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0;
  background: var(--ag);
  border-radius: 2px;
  transition: width 0.32s var(--ease);
}
.sb-item:hover::after { width: 100%; }
.sb-item:hover { background: rgba(108,99,255,0.07); }
.sb-item.is-active {
  background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(156,99,255,0.1));
  border-color: rgba(108,99,255,0.25);
}
.sb-item.is-active::after { display: none; }

.sb-item-icon {
  width: 17px; height: 17px; min-width: 17px;
  color: var(--t3);
  transition: color 0.18s;
  display: flex; align-items: center; justify-content: center;
}
.sb-item:hover .sb-item-icon { color: var(--a); }
.sb-item.is-active .sb-item-icon { color: #fff; }

.sb-item-label {
  font-size: 13px; font-weight: 500;
  color: var(--t2);
  flex: 1;
  transition: color 0.18s, opacity 0.22s;
}
.sb-item:hover .sb-item-label { color: var(--t); }
.sb-item.is-active .sb-item-label { color: #fff; font-weight: 600; }
.sidebar.is-collapsed .sb-item-label { opacity: 0; pointer-events: none; }

.sb-pill {
  font-size: 10px; font-weight: 700; letter-spacing: 0.02em;
  padding: 2px 6px; border-radius: 20px;
  background: rgba(108,99,255,0.2); color: #A09AFF;
  line-height: 1.6;
  transition: opacity 0.22s;
}
.sidebar.is-collapsed .sb-pill { opacity: 0; }

/* footer */
.sb-footer {
  padding: 16px 8px 0;
  border-top: 1px solid var(--bd);
  flex-shrink: 0;
}
.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; border-radius: 9px; cursor: pointer;
  overflow: hidden;
  transition: background 0.18s;
}
.sb-user:hover { background: var(--surface-h); }
.sb-avatar {
  width: 30px; height: 30px; min-width: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6C63FF, #FF8B94);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fh); font-size: 11px; font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.sb-user-info { display: flex; flex-direction: column; gap: 1px; overflow: hidden; transition: opacity 0.22s; }
.sb-user-name { font-size: 12.5px; font-weight: 600; color: var(--t); white-space: nowrap; }
.sb-user-role { font-size: 11px; color: var(--t3); white-space: nowrap; }
.sidebar.is-collapsed .sb-user-info { opacity: 0; }

/* ─────────────────────────────────────────────────────────────────────────────
   MAIN
───────────────────────────────────────────────────────────────────────────── */
.main {
  position: relative; z-index: 1;
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ─────────────────────────────────────────────────────────────────────────────
   TOPBAR
───────────────────────────────────────────────────────────────────────────── */
.topbar {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 34px;
  background: var(--bg-topbar);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--bd);
}
.tb-left { display: flex; flex-direction: column; gap: 1px; }
.tb-date {
  font-size: 10.5px; font-weight: 500;
  color: var(--t3); letter-spacing: 0.08em;
  text-transform: uppercase;
}
.tb-greeting {
  font-family: var(--fh);
  font-size: 18px; font-weight: 700; letter-spacing: -0.025em;
  color: var(--t);
}
.tb-right { display: flex; align-items: center; gap: 9px; }

.tb-icon {
  width: 35px; height: 35px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--bd); border-radius: 9px;
  color: var(--t2);
  position: relative;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
.tb-icon:hover { background: var(--ag-t); border-color: var(--bd-accent); color: var(--a); }
.tb-icon svg { width:14px; height:14px; }
.notif-dot {
  position: absolute; top: 7px; right: 7px;
  width: 6px; height: 6px; border-radius: 50%;
  background: #FF6B6B;
  border: 1.5px solid var(--bg-sidebar);
}

.btn-new {
  display: flex; align-items: center; gap: 7px;
  padding: 8.5px 16px;
  background: var(--ag);
  border-radius: 9px;
  font-size: 13px; font-weight: 600; color: #fff;
  box-shadow: 0 4px 18px rgba(108,99,255,0.42);
  transition: transform 0.18s var(--ease), box-shadow 0.18s;
}
.btn-new:hover { transform: translateY(-2px); box-shadow: 0 7px 26px rgba(108,99,255,0.58); }
.btn-new:active { transform: translateY(0); }
.btn-new svg { width:13px; height:13px; }

/* ─────────────────────────────────────────────────────────────────────────────
   CONTENT
───────────────────────────────────────────────────────────────────────────── */
.content {
  flex: 1; overflow-y: auto;
  padding: 28px 34px 50px;
}

/* ─────────────────────────────────────────────────────────────────────────────
   STATS ROW
───────────────────────────────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 30px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--bd);
  border-radius: 13px;
  padding: 19px 21px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.stat-card::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(108,99,255,0.55), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.stat-card:hover::before { opacity: 1; }
.stat-card:hover {
  border-color: rgba(108,99,255,0.2);
  box-shadow: 0 0 32px rgba(108,99,255,0.06);
}
.stat-head {
  display: flex; align-items: center; justify-content: space-between;
}
.stat-label {
  font-size: 11px; font-weight: 500;
  color: var(--t3); letter-spacing: 0.07em; text-transform: uppercase;
}
.stat-icon {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}
.stat-foot {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 8px;
}
.stat-val {
  font-family: var(--fh);
  font-size: 36px; font-weight: 800; letter-spacing: -0.045em; line-height: 1;
  color: var(--t);
}
.stat-unit { font-size: 18px; font-weight: 600; color: var(--t2); }
.stat-spark { flex-shrink: 0; }

/* ─────────────────────────────────────────────────────────────────────────────
   SECTION HEADER
───────────────────────────────────────────────────────────────────────────── */
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-family: var(--fh);
  font-size: 15.5px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--t);
}
.section-sub { font-size: 11.5px; color: var(--t3); margin-top: 2px; }
.section-link {
  font-size: 12px; font-weight: 500; color: var(--a);
  opacity: 0.7; cursor: pointer;
  transition: opacity 0.18s;
}
.section-link:hover { opacity: 1; }

/* ─────────────────────────────────────────────────────────────────────────────
   PROJECT GRID
───────────────────────────────────────────────────────────────────────────── */
.proj-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 12px;
  margin-bottom: 30px;
}

/* card */
.pcard {
  background: var(--surface);
  border: 1px solid var(--bd);
  border-radius: 13px;
  padding: 0;
  position: relative; overflow: hidden;
  cursor: pointer;
  opacity: 0;
  transform: translateY(22px);
  transition:
    transform  0.28s cubic-bezier(0.34,1.56,0.64,1),
    box-shadow 0.28s var(--ease),
    border-color 0.2s;
}
.pcard:hover {
  transform: translateY(-4px) !important;
  border-color: var(--bd-h);
}

/* left accent bar */
.pcard-bar {
  position: absolute; left:0; top:0; bottom:0; width:3px;
  border-radius: 3px 0 0 3px;
}

/* ambient glow behind card on hover */
.pcard-glow {
  position: absolute; inset:0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s;
  border-radius: 13px;
}
.pcard:hover .pcard-glow { opacity: 1; }

.pcard-inner { padding: 20px 20px 17px 22px; }

.pcard-top {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  gap: 12px; margin-bottom: 11px;
}
.pcard-titles { flex: 1; min-width: 0; }
.pcard-name {
  font-family: var(--fh);
  font-size: 14px; font-weight: 700; letter-spacing: -0.015em;
  color: var(--t); line-height: 1.35;
}
.pcard-status {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 5px;
  font-size: 10.5px; font-weight: 500;
  color: var(--t3);
}
.pcard-status-dot { width:5px; height:5px; border-radius:50%; }

/* progress ring */
.ring {
  position: relative; width:76px; height:76px; min-width:76px;
  flex-shrink: 0;
}
.ring svg { width:76px; height:76px; transform: rotate(-90deg); }
.ring-track { fill:none; stroke: rgba(255,255,255,0.07); stroke-width:4.5; }
.ring-fill {
  fill:none; stroke-width:4.5; stroke-linecap:round;
  transition: stroke-dashoffset var(--ring-t);
}
.ring-center {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fh); font-size:13px; font-weight:700; color:var(--t);
}

.pcard-desc {
  font-size: 12.5px; color: var(--t2); line-height: 1.65;
  margin-bottom: 16px;
}
.pcard-foot {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11.5px; font-weight: 500; white-space: nowrap; line-height: 1.6;
}
.chip-tasks {
  background: rgba(108,99,255,0.13); color: #A09AFF;
  border: 1px solid rgba(108,99,255,0.2);
}
.chip-freq {
  background: var(--surface-h); color: var(--t2);
  border: 1px solid var(--bd);
}
.chip-due {
  margin-left: auto;
  background: rgba(255,255,255,0.04); color: var(--t3);
  border: 1px solid rgba(255,255,255,0.06);
}

/* ─────────────────────────────────────────────────────────────────────────────
   ACTIVITY FEED
───────────────────────────────────────────────────────────────────────────── */
.act-wrap {
  background: var(--surface);
  border: 1px solid var(--bd);
  border-radius: 13px; overflow: hidden;
  margin-bottom: 40px;
}
.act-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 21px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.act-row:last-child { border-bottom: none; }
.act-row:hover { background: rgba(255,255,255,0.025); }
.act-dot { width:7px; height:7px; min-width:7px; border-radius:50%; }
.act-msg { flex:1; font-size:13px; color:var(--t2); line-height:1.5; }
.act-msg strong { color:var(--t); font-weight:500; }
.act-ts { font-size:11px; color:var(--t3); white-space:nowrap; font-variant-numeric:tabular-nums; }

/* ─────────────────────────────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; right: 28px; z-index: 9999;
  display: flex; align-items: center; gap: 10px;
  padding: 13px 18px; border-radius: 11px;
  background: rgba(22,22,36,0.95);
  border: 1px solid var(--bd-accent);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
  font-size: 13px; font-weight: 500; color: var(--t);
  transform: translateY(10px); opacity: 0;
  transition: transform 0.3s var(--spring), opacity 0.25s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
.toast-icon { color: var(--a); }

/* ─────────────────────────────────────────────────────────────────────────────
   ANIMATIONS
───────────────────────────────────────────────────────────────────────────── */
@keyframes cardIn {
  to { opacity:1; transform:translateY(0); }
}

</style>
</head>
<body>

<!-- ═══════════════════ SIDEBAR ═════════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">

  <button class="sb-toggle" id="sbToggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>

  <!-- Logo -->
  <div class="sb-logo">
    <div class="sb-logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="sb-logo-name">Projects Center</span>
  </div>

  <!-- Nav -->
  <nav class="sb-nav">

    <div class="sb-item is-active" data-nav="dashboard">
      <span class="sb-item-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      <span class="sb-item-label">Dashboard</span>
    </div>

    <div class="sb-item" data-nav="projects">
      <span class="sb-item-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
      </span>
      <span class="sb-item-label">Projects</span>
      <span class="sb-pill">6</span>
    </div>

    <div class="sb-item" data-nav="timeline">
      <span class="sb-item-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      <span class="sb-item-label">Timeline</span>
    </div>

    <div class="sb-item" data-nav="tasks">
      <span class="sb-item-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </span>
      <span class="sb-item-label">Tasks</span>
      <span class="sb-pill">24</span>
    </div>

    <div class="sb-item" data-nav="analytics">
      <span class="sb-item-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </span>
      <span class="sb-item-label">Analytics</span>
    </div>

    <div class="sb-divider"></div>

];

const ACTIVITY = [
  { color: '#A8E6CF', msg: 'Progress updated on <strong>Night Skywatcher</strong> to 50%',       ts: '2h ago'     },
  { color: '#FF8B94', msg: 'New milestone added to <strong>Astroman Loyal Club</strong>',         ts: '5h ago'     },
  { color: '#B4A0FF', msg: '<strong>Auto Content Creator</strong> pipeline structure reviewed',   ts: 'Yesterday'  },
  { color: '#FFE66D', msg: '<strong>Inventory Company</strong> daily sprint initiated',           ts: 'Yesterday'  },
  { color: '#4ECDC4', msg: 'Design mockups uploaded to <strong>Current Website Update</strong>',  ts: '2 days ago' },
  { color: '#FF8B94', msg: '<strong>Astroman Loyal Club</strong> reached 25% completion',        ts: '2 days ago' },
  { color: '#FF6B6B', msg: 'Editorial outline approved for <strong>Content For Week</strong>',   ts: '3 days ago' },
  { color: '#B4A0FF', msg: '<strong>Auto Content Creator</strong> project board configured',     ts: '4 days ago' }

/* ──────────────────────────── HELPERS ───────────────────────────────────── */

function $(sel, ctx = document) { return ctx.querySelector(sel); }

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function setDate() {
  const d = new Date();
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  document.getElementById('tbDate').textContent =
    `${DAYS[d.getDay()]}, ${MONS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ──────────────────────────── COUNT-UP ──────────────────────────────────── */

function countUp(el, target, suffix, dur = 1400) {
  const start = performance.now();
  const easeOut = t => 1 - Math.pow(1 - t, 3);
  function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const v = Math.round(easeOut(p) * target);
    el.innerHTML = v + (suffix ? `<span class="stat-unit">${suffix}</span>` : '');
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ──────────────────────────── SPARKLINE ─────────────────────────────────── */

function makeSparkPath(W, H, color) {
  // Generate slightly-trending-up random data
  const N = 14;
  const pts = [];
  let v = 25 + Math.random() * 20;
  for (let i = 0; i < N; i++) {
    v += (Math.random() - 0.42) * 14;
    v = Math.max(3, Math.min(97, v));
    pts.push(v);
  }
  const min = Math.min(...pts), max = Math.max(...pts);
  const rng = max - min || 1;
  const pad = 2;
  const xs = pts.map((_, i) => pad + (i / (N - 1)) * (W - pad * 2));
  const ys = pts.map(v => H - pad - ((v - min) / rng) * (H - pad * 2));

  // Smooth cardinal-spline path
  let line = `M ${xs[0]} ${ys[0]}`;
  for (let i = 1; i < N; i++) {
    const cx = (xs[i - 1] + xs[i]) / 2;
    line += ` C ${cx} ${ys[i-1]}, ${cx} ${ys[i]}, ${xs[i]} ${ys[i]}`;
  }
  const fill = line + ` L ${xs[N-1]} ${H} L ${xs[0]} ${H} Z`;

  const gid = 'g' + Math.random().toString(36).slice(2);
  return `
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.32"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${fill}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
  `;
}

/* ──────────────────────────── RING ──────────────────────────────────────── */

const R = 32;        // ring radius
const CX = 38;       // center x/y (viewBox 76x76)
const CIRC = 2 * Math.PI * R;  // ≈ 201.06

function ringHTML(progress, accent) {
  const id = 'rf' + Math.random().toString(36).slice(2);
  return `
    <div class="ring">
      <svg viewBox="0 0 76 76">
        <circle class="ring-track" cx="${CX}" cy="${CX}" r="${R}"/>
        <circle class="ring-fill" id="${id}"
          cx="${CX}" cy="${CX}" r="${R}"
          stroke="${accent}"
          stroke-dasharray="${CIRC.toFixed(3)}"
          stroke-dashoffset="${CIRC.toFixed(3)}"
        />
      </svg>
      <div class="ring-center">${progress}%</div>
    </div>
  `;
}

/* ──────────────────────────── RENDER STATS ─────────────────────────────── */

function renderStats() {
  const row = document.getElementById('statsRow');
  STATS.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'stat-card';
    const vid = `sv${i}`, spid = `sp${i}`;
    div.innerHTML = `
      <div class="stat-head">
        <span class="stat-label">${s.label}</span>
        <span class="stat-icon" style="background:${s.color}1A">${s.icon}</span>
      </div>
      <div class="stat-foot">
        <span class="stat-val" id="${vid}">0</span>
        <svg id="${spid}" class="stat-spark" width="80" height="34"
             viewBox="0 0 80 34" overflow="visible"></svg>
      </div>
    `;
    row.appendChild(div);
    setTimeout(() => {
      countUp(document.getElementById(vid), s.val, s.suffix, 1300 + i * 60);
      document.getElementById(spid).innerHTML = makeSparkPath(80, 34, s.color);
    }, 120 + i * 55);
  });
}

/* ──────────────────────────── RENDER PROJECTS ──────────────────────────── */

function renderProjects() {
  const grid = document.getElementById('projGrid');

  PROJECTS.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'pcard';

    // status dot color
    const dotColor = p.progress > 0 ? '#4ECDC4' : '#3E3D5A';

    card.innerHTML = `
      <div class="pcard-bar" style="background:${p.accent}"></div>
      <div class="pcard-glow"
           style="background:radial-gradient(ellipse at top left,${p.accent}14 0%,transparent 60%)">
      </div>
      <div class="pcard-inner">
        <div class="pcard-top">
          <div class="pcard-titles">
            <div class="pcard-name">${p.name}</div>
            <div class="pcard-status">
              <span class="pcard-status-dot" style="background:${dotColor}"></span>
              ${p.statusLabel}
            </div>
          </div>
          ${ringHTML(p.progress, p.accent)}
        </div>
        <div class="pcard-desc">${p.desc}</div>
        <div class="pcard-foot">
          <span class="chip chip-tasks">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            ${p.tasks} tasks
          </span>
          <span class="chip chip-freq">${p.freq}</span>
          <span class="chip chip-due">Due ${p.due}</span>
        </div>
      </div>
    `;

    // dynamic hover glow per accent
    card.addEventListener('mouseenter', () => {
      card.style.boxShadow = `0 20px 48px ${p.accent}20, 0 0 0 1px ${p.accent}30`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.boxShadow = '';
    });

    grid.appendChild(card);

    // stagger entrance — 80ms between cards
    setTimeout(() => {
      card.style.animation = `cardIn 0.48s cubic-bezier(0.4,0,0.2,1) forwards`;
    }, 80 * i + 60);
  });

  // Animate rings after cards appear
  setTimeout(() => {
    const fills = document.querySelectorAll('.ring-fill');
    fills.forEach((el, i) => {
      const p = PROJECTS[i];
      if (!p) return;
      const target = CIRC * (1 - p.progress / 100);
      // Small stagger so rings animate in sequence
      setTimeout(() => {
        el.style.strokeDashoffset = target.toFixed(3);
      }, 120 + i * 70);
    });
  }, 350);
}

/* ──────────────────────────── RENDER ACTIVITY ──────────────────────────── */

function renderActivity() {
